items:
  - id: first-aid
    type: skill
    title:
      en: First Aid
      de: Erste Hilfe
    description:
      en: You can act quickly in an emergency and provide first aid.
      de: Du kannst im Notfall schnell handeln und Erste Hilfe leisten.
    icon: assets/items/skills/first-aid.svg
  - id: local-knowledge
    type: skill
    title:
      en: Local Knowledge
      de: Ortskenntnis
    description:
      en: You know your surroundings well and can identify hazards and safe areas.
      de: Du kennst deine Umgebung und weißt, wo Gefahren und sichere Orte sind.
    icon: assets/items/skills/local-knowledge.svg
  - id: self-protection
    type: skill
    title:
      en: Personal Safety
      de: Eigenschutz
    description:
      en: You assess risks realistically and do not put yourself or others in danger.
      de: Du schätzt Risiken realistisch ein und bringst dich und andere nicht in Gefahr.
    icon: assets/items/skills/personal-safety.svg
  - id: coordination
    type: skill
    title:
      en: Coordination
      de: Koordination
    description:
      en: You coordinate with others and make decisions together.
      de: Du sprichst dich mit anderen ab und triffst Entscheidungen gemeinsam.
    icon: assets/items/skills/coordination.svg
  - id: care-competence
    type: skill
    title:
      en: Caretaking
      de: Pflege
    description:
      en: You can provide care for dependent individuals, even in a crisis.
      de: Du kannst pflegebedürftige Menschen auch im Krisenfall versorgen.
    icon: assets/items/skills/caretaking.svg
  - id: supplies
    type: resource
    title:
      en: Food & Water
      de: Vorräte
    description:
      en: With sufficient water and food, you can stay at home for several days.
      de: Mit ausreichend Wasser und Lebensmitteln kannst du mehrere Tage zu Hause bleiben.
    icon: assets/items/resources/food-water.svg
  - id: flashlight
    type: resource
    title:
      en: Flashlight
      de: Taschenlampe
    description:
      en: You bring light into the dark when it matters most.
      de: Damit bringst du Licht ins Dunkel, wenn es darauf ankommt.
    icon: assets/items/resources/flashlight.svg
  - id: power-bank
    type: resource
    title:
      en: Power Bank
      de: Powerbank
    description:
      en: Your smartphone and game console remain usable.
      de: Smartphone und Spielekonsole bleiben einsatzbereit.
    icon: assets/items/resources/power-bank.svg
  - id: crank-radio
    type: resource
    title:
      en: Crank Radio
      de: Kurbelradio
    description:
      en: You can stay informed even without internet or mobile service.
      de: Auch ohne Internet oder Mobilfunk bleibst du über das Radio informiert.
    icon: assets/items/resources/crank-radio.svg
  - id: cooking-option
    type: resource
    title:
      en: Gas Stove
      de: Gaskocher
    description:
      en: With a gas stove, you can cook even without electricity.
      de: Mit einem Gaskocher kannst du auch ohne Strom warm kochen.
    icon: assets/items/resources/gas-stove.svg
  - id: medkit
    type: resource
    title:
      en: Medical Supplies
      de: Hausapotheke
    description:
      en: With medication and basic medical supplies, you can treat yourself and others.
      de: Mit Medikamenten und Verbandsmaterial kannst du dich und andere versorgen.
    icon: assets/items/resources/medical-supplies.svg
  - id: warning-app
    type: resource
    title:
      en: Warning App
      de: Warn-App
    description:
      en: You receive official warnings directly on your smartphone.
      de: Du erhältst offizielle Warnungen direkt auf dein Smartphone.
    icon: assets/items/resources/warning-app.svg
  - id: emergency-bag
    type: resource
    title:
      en: Emergency Bag
      de: Notfalltasche
    description:
      en: Essential items such as documents, medication and warm clothing are ready at hand.
      de: Wichtige Dinge wie Dokumente, Medikamente und warme Kleidung sind griffbereit.
    icon: assets/items/resources/emergency-bag.svg

characterTypes:
  - id: character_1
    items:
      - first-aid
      - self-protection
    title: Noa
    description:
      en: Noa has just completed a first aid course for a driving license. In stressful situations, Noa prefers to follow clear instructions. The small cheat sheet from the course is still in Noa’s jacket pocket. Just in case
      de: Noa hat gerade den Erste-Hilfe-Kurs für den Führerschein gemacht. In stressigen Situationen folgt Noa am liebsten klaren Anweisungen. In der Jackentasche steckt noch der kleine Spickzettel aus dem Kurs. Nur für den Fall.
    image: assets/characters/noa.webp
    croppedImage: assets/characters/noa-portrait.webp
  - id: character_2
    items:
      - warning-app
      - power-bank
    title: Deniz
    description:
      en: Deniz organizes almost everything through his smartphone. He notices early when something’s off and quickly checks reliable information. After being stranded with an empty battery once, he never leaves without a power bank.
      de: Deniz organisiert fast alles über sein Smartphone. Er merkt früh, wenn etwas nicht stimmt, und checkt schnell verlässliche Infos. Nachdem er einmal mit leerem Akku gestrandet ist, verlässt er das Haus nie ohne Powerbank.
    image: assets/characters/deniz.webp
    croppedImage: assets/characters/deniz-portrait.webp
  - id: character_3
    items:
      - crank-radio
      - cooking-option
    title: Alex
    description:
      en: "Alex loves spending time outdoors, whether camping, hiking, or festivals. Improvising and finding practical solutions that work without a power outlet are simply part of the experience. If needed, a simple pot of pasta is enough to get by."
      de: "Alex ist gern draußen unterwegs, egal ob Camping, Wandern oder auf Festivals. Improvisation und Lösungen, die auch ohne Steckdose funktionieren, gehören selbstverständlich dazu. Notfalls gibt es eben Nudeln aus dem Topf."
    image: assets/characters/alex.webp
    croppedImage: assets/characters/alex-portrait.webp
  - id: character_4
    items:
      - coordination
      - supplies
    title: Yasmin
    description:
      en: "Yasmin juggles work, children, and everyday life. She is used to keeping several things in mind at once and making sure everyone knows what to do. Her shopping motto: better to be prepared than to improvise later."      
      de: "Yasmin jongliert Job, Kinder und Alltag. Sie ist es gewohnt, mehrere Dinge gleichzeitig im Blick zu behalten und dafür zu sorgen, dass alle wissen, was zu tun ist. Ihr Einkaufs-Motto: lieber vorbereitet sein als später improvisieren."
    image: assets/characters/yasmin.webp
    croppedImage: assets/characters/yasmin-portrait.webp
  - id: character_5
    items:
      - care-competence
      - warning-app
    title: Daniel
    description:
      en: "Daniel regularly supports his mother, who needs care. He knows what matters in everyday care and checks reliable information early. For most situations, he already has a plan B in mind."
      de: "Daniel unterstützt regelmäßig seine pflegebedürftige Mutter. Er weiß, worauf es im Pflegealltag ankommt, und prüft frühzeitig verlässliche Informationen. Für die meisten Fälle hat er schon einen Plan B im Kopf."
    image: assets/characters/daniel.webp
    croppedImage: assets/characters/daniel-portrait.webp
  - id: character_6
    items:
      - local-knowledge
      - flashlight
    title: Petra
    description:
     en: "Petra has lived in the region for a long time and has experienced severe weather before. She knows the risky areas, the safer routes, and a few shortcuts that are not on every map. Experience outweighs speed."
     de: "Petra lebt schon lange in der Region und hat Unwetter bereits öfter erlebt. Sie kennt riskante Stellen, sichere Wege und ein paar Abkürzungen, die nicht auf jeder Karte stehen. Erfahrung schlägt Tempo."
    image: assets/characters/petra.webp
    croppedImage: assets/characters/petra-portrait.webp

challenges:
  - id: heavy-rain
    title:
      en: Heavy Rain
      de: Dauerregen
    description:
      en: It is night-time and heavy rain has been falling for hours. You go down to the basement to check whether water has entered. The situation is unclear, and you need to decide how to proceed.
      de: Es ist Nacht und starker Regen fällt seit Stunden. Du gehst in den Keller, um zu prüfen, ob Wasser eingedrungen ist. Die Lage dort ist unklar und du musst entscheiden, wie du vorgehst.
    image: assets/challenges/heavy-rain.webp
    solution:
      items:
        - id: self-protection
          present:
            en: You avoid unnecessary risks, switch off the power, and stay out of the water.
            de: Du gehst kein unnötiges Risiko ein, schaltest den Strom ab und gehst nicht ins Wasser.
          missing:
            en: Carelessness around water and electricity can be very dangerous.
            de: Unvorsichtiges Handeln bei Wasser und Strom kann sehr gefährlich sein.
        - id: flashlight
          present:
            en: Even without electricity, you can monitor the situation in the basement.
            de: Auch ohne Strom kannst du die Lage im Keller überblicken.
          missing:
            en: The basement is too dark to clearly recognize hazards.
            de: Der Keller ist zu dunkel, um Gefahren gut zu erkennen.
      success:
        en: Well done! Using the flashlight, you detect the flooding early and avoid unnecessary risks. You do not enter the basement further and immediately shut off electricity and gas.
        de: Gut gemacht! Mit der Taschenlampe erkennst du die Überflutung rechtzeitig und gehst kein unnötiges Risiko ein. Du betrittst den Keller nicht weiter und schaltest sofort Strom und Gas ab.
  - id: after-the-storm
    title:
      en: After the Storm
      de: Nach dem Sturm
    description:
      en: After a storm, your neighbor gets injured while trying to clear a fallen tree. Emergency services are delayed. You are on site and need to help until support arrives.
      de: Nach einem Sturm verletzt sich dein Nachbar beim Versuch, einen umgestürzten Baum zu beseitigen. Der Rettungsdienst verspätet sich. Du bist vor Ort und gefragt, bis Hilfe eintrifft.
    image: assets/challenges/after-the-storm.webp
    solution:
      items:
        - id: first-aid
          present:
            en: You can help immediately and stabilize your neighbor until emergency services arrive.
            de: Du kannst schnell helfen und stabilisierst deinen Nachbarn, bis der Rettungsdienst kommt.
          missing:
            en: Your neighbor needs help quickly, but you don’t know what to do.
            de: Dein Nachbar braucht schnell Hilfe, aber du weißt nicht, was zu tun ist.
        - id: medkit
          present:
            en: You have everything you need to treat wounds and relieve pain.
            de: Du hast alles Nötige zur Hand, um Schmerzen zu lindern und Wunden zu versorgen.
          missing:
            en: Without proper supplies, injuries can only be treated in a limited way.
            de: Ohne geeignete Mittel kannst du Verletzungen nur eingeschränkt versorgen.
      success:
        en: Well done! You act quickly and calmly. With your first-aid knowledge and the supplies you have at home, you can treat and stabilize your neighbor until professional help arrives.
        de: Gut gemacht! Du handelst schnell und ruhig. Mit deinem Wissen aus der Ersten Hilfe und der Wundversorgung, die du Zuhause hast, kannst du deinen Nachbarn versorgen und stabilisieren, bis professionelle Hilfe eintrifft.
  - id: storm-surge
    title:
      en: Storm Surge
      de: Sturmflut
    description:
      en: You learn from the news that a storm surge has been announced. Some parts of the city are to be evacuated. You must decide whether to stay or where to go.
      de: Über die Nachrichten erfährst du, dass eine Sturmflut angekündigt wurde. Einige Stadtteile sollen evakuiert werden. Du musst entscheiden, ob du bleibst oder wohin du gehst.
    image: assets/challenges/storm-surge.webp
    solution:
      items:
        - id: local-knowledge
          present:
            en: You know safe routes and can deliberately avoid dangerous areas.
            de: Du kennst sichere Wege und kannst Gefahrenbereiche gezielt vermeiden.
          missing:
            en: You may choose an unsafe or longer route if you are not familiar with the area.
            de: Du wählst eine unsichere oder längere Route, wenn du dich vor Ort nicht auskennst.
        - id: warning-app
          present:
            en: Via the warning app, you get clear guidance and can react quickly.
            de: Durch die Warn-App erhältst du klare Anweisungen und kannst rechtzeitig reagieren.
          missing:
            en: Without current warnings, you may find out too late whether you need to evacuate.
            de: Ohne aktuelle Warnungen erfährst du zu spät, ob du evakuieren musst.
        - id: emergency-bag
          present:
            en: All you need is ready, and you can leave at once.
            de: Alles Wichtige ist griffbereit, sodass du sofort aufbrechen kannst.
          missing:
            en: In the rush, you might forget important items
            de: In der Eile vergisst du möglicherweise wichtige Dinge.
      success:
        en: Well done! Thanks to the warning app, you know you live in an affected area. You quickly pack your emergency bag with all essential items and take the safest route out of the danger zone.
        de: Gut gemacht! Dank der Warn-App, weiß du, dass du in einem betroffenen Gebiet wohnst. Du packst schnell dein Notgepäck mit allen wichtigen Sachen und machst dich auf den sichersten Weg raus aus dem Gefahrengebiet.
  - id: emergency-care
    title:
      en: Emergency Care
      de: Notfallpflege
    description:
      en: The power has gone out, and your mother is being cared for at home. She depends on an electric ventilator. You must assess the situation and act accordingly.
      de: Der Strom ist ausgefallen, und deine Mutter wird zu Hause gepflegt. Sie ist auf ein elektrisches Beatmungsgerät angewiesen. Du musst die Situation einschätzen und entsprechend handeln.
    image: assets/challenges/emergency-care.webp
    solution:
      items:
        - id: care-competence
          present:
            en: Your experience in care helps you keep an overview and act with purpose.
            de: Deine Erfahrung in der Pflege hilft dir, ruhig zu bleiben und gezielt zu handeln.
          missing:
            en: Without caregiving experience, the situation can quickly become overwhelming.
            de: Ohne Pflegeerfahrung kann dich die Situation schnell überfordern.
        - id: medkit
          present:
            en: Essential medication and tools are available in an emergency.
            de: Wichtige Medikamente und Hilfsmittel stehen im Notfall bereit.
          missing:
            en: Without medication and a manual resuscitator, you cannot respond appropriately.
            de: Ohne Medikamente und Handbeatmungsgerät kannst du nicht angemessen reagieren.
        - id: warning-app
          present:
            en: You receive updates through the warning app about how long the outage is expected to last.
            de: Über die Warn-App erhältst du Infos zur voraussichtlichen Dauer des Stromausfalls.
          missing:
            en: Without reliable current information, it remains unclear how long the outage will last.
            de: Ohne verlässliche aktuelle Informationen bleibt unklar, wie lange der Ausfall dauern wird.
      success:
        en: Well done! Your experience helps you stay calm and act purposefully. You check the battery level of the ventilator and prepare the manual ventilation bag. You support your mother as best as possible and can call professional help if needed.
        de: Gut gemacht! Deine Erfahrung hilft dir, ruhig zu bleiben und gezielt zu handeln. Du prüfst den Akkustand des Beatmungsgeräts und hältst den Beatmungsbeutel für die Handbeatmung bereit. Damit unterstützt du deine Mutter bestmöglich und kannst im Zweifel professionelle Hilfe holen.
  - id: in-the-crowd
    title:
      en: In the Crowd
      de: In der Menge
    description:
      en: At the Christmas market, rumors about an accident are spreading. Tension rises, and your companion wants to leave. How do you react?
      de: Auf einem Weihnachtsmarkt machen Gerüchte über einen angeblichen Unfall die Runde. Die Stimmung wird unruhig und deine Begleitung drängt darauf, zu gehen. Wie reagierst du?
    image: assets/challenges/in-the-crowd.webp
    solution:
      items:
        - id: self-protection
          present:
            en: You don’t let panic take over and avoid unnecessary risks.
            de: Du lässt dich nicht von Panik mitreißen und bringst dich nicht unnötig in Gefahr.
          missing:
            en: Don't underestimate the chaotic situation. Don’t act hastily.
            de: Unterschätze die chaotische Situation nicht. Handle nicht überstürzt.
        - id: coordination
          present:
            en: You speak calmly with your companion and decide together how to proceed.
            de: Du sprichst ruhig mit deiner Begleitung und ihr entscheidet gemeinsam.
          missing:
            en: Without checking in with your companion, you may make hasty decisions.
            de: Ohne Rücksprache mit deiner Begleitung triffst du vorschnelle Entscheidungen.
        - id: power-bank
          present:
            en: Your phone remains usable if the situation changes.
            de: Dein Handy bleibt einsatzbereit, falls sich die Lage doch verändert.
          missing:
            en: With an empty battery, orientation and communication quickly become difficult.
            de: Mit niedrigem Akkustand werden Orientierung und Kommunikation schwierig.
        - id: warning-app
          present:
            en: You receive official information and instructions as soon as they are available.
            de: Mit deiner Warn-App bekommst du sofort relevante Informationen und Anweisungen.
          missing:
            en: Without reliable information, rumours cause additional uncertainty.
            de: Fehlen gesicherte Informationen, verunsichern Gerüchte zusätzlich.
      success:
        en: Well done! You stay calm and assess the situation instead of being swept up by rumors. Using the warning app, you quickly find out that there is no official alert. The rumors turn out to be false – you can continue enjoying the market.
        de: Gut gemacht! Ihr bleibt ruhig und prüft die Situation, statt euch von Gerüchten anstecken zu lassen. Über die Warn-App findet ihr schnell heraus, dass es keine offizielle Meldung gibt. Die Gerüchte bestätigen sich nicht – ihr könnt den Markt entspannt weiter genießen.
  - id: blackout
    title:
      en: Blackout
      de: Blackout
    description:
      en: The entire region has been without electricity and water for two days. Internet and mobile networks are down. You are at home with your family and must provide for them under these conditions.
      de: Seit zwei Tagen gibt es in der gesamten Region keinen Strom und kein Wasser. Auch Internet und Mobilfunk sind ausgefallen. Du bist mit deiner Familie zu Hause und musst sie unter diesen Bedingungen versorgen.
    image: assets/challenges/blackout.webp
    solution:
      items:
        - id: supplies
          present:
            en: Even during a prolonged blackout, you have enough to eat and drink
            de: Auch bei einem mehrtägigen Blackout habt ihr genug zu essen und zu trinken.
          missing:
            en: Water and food are scarce and must be rationed.
            de: Wasser und Lebensmittel sind knapp und müssen rationiert werden.
        - id: flashlight
          present:
            en: You can move safely and maintain orientation even in the evening and at night.
            de: Auch abends und nachts kannst du dich sicher bewegen und orientieren.
          missing:
            en: Darkness increases uncertainty and accident risk.
            de: Dunkelheit erhöht Unsicherheit und Unfallrisiken.
        - id: crank-radio
          present:
            en: You stay informed about important developments even without internet and phone.
            de: Auch ohne Internet und Telefon bleibst du über wichtige Entwicklungen informiert.
          missing:
            en: Without information, the situation quickly feels uncontrollable.
            de: Ohne Informationen fühlt sich die Situation schnell unkontrollierbar an.
        - id: cooking-option
          present:
            en: You can prepare warm meals and heat water.
            de: Du kannst warme Mahlzeiten zubereiten und Wasser erhitzen.
          missing:
            en: Many foods remain unusable without cooking facilities.
            de: Ohne Kochmöglichkeit bleiben viele Lebensmittel unbrauchbar.
      success:
        en: Well done! You remain calm and capable of acting. You can prepare warm meals, stay informed via radio, and have light at night. The situation feels manageable.
        de: Gut gemacht! Ihr bleibt ruhig und handlungsfähig. Ihr könnt euch etwas Warmes zu essen machen, seid über das Radio informiert und habt auch nachts Licht. So fühlt sich die Situation kontrollierbar an.
